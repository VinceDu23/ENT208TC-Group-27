<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitVision - 登录</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1119;
      background-image: radial-gradient(ellipse at 30% 20%, rgba(0,255,136,0.06) 0%, transparent 60%);
    }
    .login-card {
      width: 400px;
      max-width: 92vw;
      background: #1a1d2e;
      border: 1px solid #2a2f45;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-header { text-align: center; margin-bottom: 36px; }
    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ff88, #00cc66);
      font-size: 28px;
      margin-bottom: 16px;
    }
    .login-logo-img {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: cover;
      display: block;
      margin: 0 auto 16px;
    }
    .login-title { font-size: 22px; font-weight: 700; color: #e8eaed; }
    .login-subtitle { font-size: 13px; color: #9aa0b4; margin-top: 6px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #9aa0b4; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: #0f1119;
      border: 1px solid #2a2f45;
      border-radius: 12px;
      color: #e8eaed;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: #555b6e; }
    .form-input:focus { border-color: #00ff88; box-shadow: 0 0 0 3px rgba(0,255,136,0.2); }
    .form-input.error { border-color: #ff4d5a; }
    .input-wrapper { position: relative; }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9aa0b4;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }
    .form-error { font-size: 12px; color: #ff4d5a; margin-top: 4px; display: none; }
    .form-error.visible { display: block; }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #00cc66, #009944);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-btn:hover { opacity: 0.92; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #9aa0b4; }
    .login-footer a { color: #00ff88; text-decoration: none; font-weight: 500; cursor: pointer; }
    .extra-fields { display: none; }
    .extra-fields.show { display: block; }
    .strength-bar { height: 3px; border-radius: 2px; margin-top: 4px; width: 0; background: transparent; transition: width 0.3s, background 0.3s; }
    .strength-bar.weak { width: 25%; background: #ff4d5a; }
    .strength-bar.fair { width: 50%; background: #ff9f43; }
    .strength-bar.good { width: 75%; background: #00ff88; }
    .strength-bar.strong { width: 100%; background: #34c759; }
    .toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000;
      pointer-events: none;
    }
    .toast.error { background: #3d1318; color: #ff4d5a; border: 1px solid #5a1d24; }
    .toast.success { background: #132c1a; color: #34c759; border: 1px solid #1d4a28; }
    .theme-toggle {
      position: fixed; top: 16px; right: 16px;
      width: 36px; height: 36px; padding: 0;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 50%;
      background: rgba(255,255,255,0.04); font-size: 18px;
      cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.12); }

    /* Light theme overrides */
    body.light-theme.login-page {
      background: #f2f4f7;
      background-image: radial-gradient(ellipse at 30% 20%, rgba(0,170,85,0.06) 0%, transparent 60%);
    }
    body.light-theme .login-card {
      background: #ffffff;
      border-color: #dce0e5;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    body.light-theme .login-title { color: #1a1d2b; }
    body.light-theme .login-subtitle { color: #5a6072; }
    body.light-theme .form-label { color: #5a6072; }
    body.light-theme .form-input {
      background: #f2f4f7; border-color: #dce0e5; color: #1a1d2b;
    }
    body.light-theme .form-input::placeholder { color: #8994a6; }
    body.light-theme .form-input:focus { border-color: #00a855; box-shadow: 0 0 0 3px rgba(0,170,85,0.15); }
    body.light-theme .toggle-pw { color: #5a6072; }
    body.light-theme .login-footer { color: #5a6072; }
    body.light-theme .login-footer a { color: #00a855; }
    body.light-theme .toast.error { background: #fce8e6; color: #d93025; border-color: #f5c6c2; }
    body.light-theme .toast.success { background: #e6f4ea; color: #137333; border-color: #ceead6; }
    body.light-theme .login-btn { color: #fff; }
    body.light-theme .theme-toggle {
      border-color: #dce0e5;
      background: rgba(0,0,0,0.03);
    }
    body.light-theme .theme-toggle:hover { background: rgba(0,0,0,0.08); }
  </style>
</head>
<body class="login-page">
  <button class="theme-toggle" id="themeToggleLogin" title="Toggle Theme">🌙</button>
  <div class="login-card">
    <div class="login-header">
      <img class="login-logo-img" src="favicon.jpg" alt="FitVision">
      <div class="login-title">FitVision</div>
      <div class="login-subtitle" id="formSubtitle">智能力量训练助手</div>
    </div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group extra-fields" id="nameGroup">
        <label class="form-label">昵称</label>
        <input type="text" class="form-input" id="inputName" placeholder="输入您的昵称" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" id="inputEmail" placeholder="name@example.com">
        <div class="form-error" id="emailError"></div>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-wrapper">
          <input type="password" class="form-input" id="inputPassword" placeholder="至少 6 位字符" maxlength="32">
          <button type="button" class="toggle-pw" id="togglePw">&#x1F441;</button>
        </div>
        <div class="strength-bar" id="pwStrength"></div>
        <div class="form-error" id="pwError"></div>
      </div>
      <div class="form-group extra-fields" id="confirmGroup">
        <label class="form-label">确认密码</label>
        <input type="password" class="form-input" id="inputConfirm" placeholder="再次输入密码" maxlength="32">
        <div class="form-error" id="confirmError"></div>
      </div>
      <div class="form-error" id="globalError" style="margin-bottom:8px;"></div>
      <button type="submit" class="login-btn" id="submitBtn">登 录</button>
    </form>
    <div class="login-footer">
      <span id="toggleText">还没有账号？</span>
      <a id="toggleLink">立即注册</a>
    </div>
  </div>
  <script>
    // Theme
    (function(){
      var s = localStorage.getItem('smartlift_theme');
      if (s === 'light') { document.body.classList.add('light-theme'); }
      var btn = document.getElementById('themeToggleLogin');
      if (btn) btn.textContent = s === 'light' ? '☀️' : '🌙';
    })();

    var STORAGE_KEY = 'smartlift_accounts';
    var SESSION_KEY = 'smartlift_user';
    var isRegisterMode = false;

    function $id(id) { return document.getElementById(id); }

    function getAccounts() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch(e) { return {}; } }
    function saveAccounts(a) { localStorage.setItem(STORAGE_KEY, JSON.stringify(a)); }
    function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; } }
    function setSession(u) { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }

    function toast(msg, type) {
      var old = document.querySelector('.toast'); if (old) old.remove();
      var t = document.createElement('div'); t.className = 'toast '+type; t.textContent = msg;
      document.body.appendChild(t); setTimeout(function(){ t.remove(); }, 2800);
    }

    function validEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function pwLevel(pw) {
      var s = 0;
      if (pw.length>=6) s++; if (pw.length>=10) s++;
      if (/[a-z]/.test(pw)&&/[A-Z]/.test(pw)) s++;
      if (/\d/.test(pw)) s++;
      if (/[^a-zA-Z0-9]/.test(pw)) s++;
      if (s<=1) return 'weak'; if (s<=2) return 'fair'; if (s<=3) return 'good'; return 'strong';
    }

    function setRegisterMode(on) {
      isRegisterMode = on;
      var extra = document.querySelectorAll('.extra-fields');
      extra.forEach(function(el){ el.classList.toggle('show', on); });
      $id('formSubtitle').textContent = on ? '创建新账号' : '智能力量训练助手';
      $id('submitBtn').textContent = on ? '注 册' : '登 录';
      $id('toggleText').textContent = on ? '已有账号？' : '还没有账号？';
      $id('toggleLink').textContent = on ? '立即登录' : '立即注册';
      clearErrors(); $id('loginForm').reset(); $id('pwStrength').className = 'strength-bar';
    }

    function clearErrors() {
      ['emailError','pwError','confirmError','globalError'].forEach(function(id){
        var el = $id(id); el.classList.remove('visible'); el.textContent = '';
      });
      ['inputEmail','inputPassword','inputConfirm'].forEach(function(id){
        $id(id).classList.remove('error');
      });
      $id('pwStrength').className = 'strength-bar';
    }

    $id('loginForm').addEventListener('submit', function(e) {
      e.preventDefault(); clearErrors();
      var email = $id('inputEmail').value.trim();
      var pw = $id('inputPassword').value;
      if (!email || !validEmail(email)) {
        $id('emailError').textContent = '请输入有效的邮箱地址';
        $id('emailError').classList.add('visible');
        $id('inputEmail').classList.add('error'); return;
      }
      if (!pw || pw.length < 6) {
        $id('pwError').textContent = '密码至少需要 6 位字符';
        $id('pwError').classList.add('visible');
        $id('inputPassword').classList.add('error'); return;
      }
      var accounts = getAccounts();
      if (isRegisterMode) {
        var name = $id('inputName').value.trim() || email.split('@')[0];
        var cfm = $id('inputConfirm').value;
        if (pw !== cfm) {
          $id('confirmError').textContent = '两次输入的密码不一致';
          $id('confirmError').classList.add('visible');
          $id('inputConfirm').classList.add('error'); return;
        }
        if (accounts[email]) {
          $id('globalError').textContent = '该邮箱已被注册';
          $id('globalError').classList.add('visible'); return;
        }
        accounts[email] = { name: name, password: pw, createdAt: new Date().toISOString() };
        saveAccounts(accounts);
        setSession({ email: email, name: name });
        toast('注册成功，正在跳转...', 'success');
        setTimeout(function(){ window.location.href = 'index.html'; }, 800);
      } else {
        var acc = accounts[email];
        if (!acc) {
          $id('globalError').textContent = '该邮箱未注册';
          $id('globalError').classList.add('visible'); return;
        }
        if (acc.password !== pw) {
          $id('globalError').textContent = '密码错误';
          $id('globalError').classList.add('visible'); return;
        }
        setSession({ email: email, name: acc.name });
        toast('登录成功，正在跳转...', 'success');
        setTimeout(function(){ window.location.href = 'index.html'; }, 600);
      }
    });

    $id('inputPassword').addEventListener('input', function() {
      if (!isRegisterMode) return;
      var pw = $id('inputPassword').value;
      $id('pwStrength').className = pw ? 'strength-bar ' + pwLevel(pw) : 'strength-bar';
    });

    $id('togglePw').addEventListener('click', function() {
      var isPw = $id('inputPassword').type === 'password';
      $id('inputPassword').type = isPw ? 'text' : 'password';
      $id('togglePw').innerHTML = isPw ? '&#x1F648;' : '&#x1F441;';
    });

    $id('toggleLink').addEventListener('click', function() { setRegisterMode(!isRegisterMode); });

    ['inputEmail','inputPassword','inputConfirm'].forEach(function(id){
      $id(id).addEventListener('input', function(){ clearErrors(); });
    });

    if (getSession()) { window.location.href = 'index.html'; }

    // Theme toggle
    $id('themeToggleLogin').addEventListener('click', function() {
      var isLight = document.body.classList.toggle('light-theme');
      localStorage.setItem('smartlift_theme', isLight ? 'light' : 'dark');
      this.textContent = isLight ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
